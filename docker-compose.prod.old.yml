services:

  fastapi:
    container_name: mlens-fastapi
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      - MODEL_DIR=/app/models
      - DATA_DIR=/app/data
      - MLRUNS_DIR=/app/mlruns
      - LOG_LEVEL=INFO
    volumes:
      - ./models:/app/models:ro
      - ./mlruns:/app/mlruns:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - frontend-network
      - backend-network

  frontend:
    container_name: mlens-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/mlens.conf:ro
    expose:
      - "80"                      
    depends_on:
      - fastapi
    restart: unless-stopped
    networks:
      - frontend-network
      - backend-network
      - proxy-network             

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
  proxy-network:
    external: true