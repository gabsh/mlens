services:
  fastapi:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      - MODEL_DIR=/app/models
      - DATA_DIR=/app/data
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - LOG_LEVEL=INFO
    volumes:
      - ./models:/app/models:ro
      - ./mlruns:/app/mlruns:ro
    ports:
      - "8000:8000"
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend-network
      - backend-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      - API_TARGET=http://fastapi:8000
    ports:
      - "5173:5173"
    depends_on:
      - fastapi
    restart: unless-stopped
    networks:
      - frontend-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri /mlruns
      --default-artifact-root /mlruns
      --allowed-hosts "*"
    volumes:
      - ./mlruns:/mlruns
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend-network

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
